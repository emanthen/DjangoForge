name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: djangoforge_test
          POSTGRES_USER: djangoforge
          POSTGRES_PASSWORD: djangoforge
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff lint
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgres://djangoforge:djangoforge@localhost:5432/djangoforge_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only-not-for-production
          DEBUG: "False"
          DJANGO_SETTINGS_MODULE: config.settings.testing
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_PUBLISHABLE_KEY: pk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_fake
        run: |
          uv run coverage run -m pytest --tb=short
          uv run coverage report --fail-under=70
          uv run coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Bandit SAST
        run: uv run bandit -r apps/ -ll --exit-zero

      - name: Run Safety CVE check
        run: uv run safety check --exit-zero || true
