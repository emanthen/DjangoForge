name: Bug Report
description: Report a bug in DjangoForge
labels: ["bug"]
body:
  - type: input
    id: django-version
    attributes:
      label: Django version
      placeholder: "5.2"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run docker compose up
        2. Navigate to /billing/
        3. Click Upgrade
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
