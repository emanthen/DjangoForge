{% extends "base.html" %}
{% block title %}Payment Successful — DjangoForge{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="card text-center max-w-sm w-full py-12">
    <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-950 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-sm">
      <svg class="w-8 h-8 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">Payment successful!</h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm mb-8 leading-relaxed">Your subscription has been activated. All features are now available for your organization.</p>
    <div class="flex flex-col gap-3">
      <a href="{% url 'accounts:dashboard' %}" class="btn-primary w-full justify-center py-2.5">
        Go to Dashboard
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </a>
      <a href="{% url 'billing:pricing' %}" class="btn-secondary w-full justify-center text-sm">
        View billing details
      </a>
    </div>
  </div>
</div>
{% endblock %}
