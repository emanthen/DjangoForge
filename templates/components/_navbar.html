<header class="h-14 flex-shrink-0 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center px-4 md:hidden">
  <button @click="sidebarOpen = !sidebarOpen" class="p-2 -ml-2 rounded-lg text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" aria-label="Open menu">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
  <div class="flex items-center gap-2 mx-auto">
    <div class="w-6 h-6 bg-primary-600 rounded-md flex items-center justify-center">
      <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
    <span class="font-semibold text-sm text-slate-900 dark:text-slate-100">DjangoForge</span>
    {% if current_org %}
    <span class="text-slate-300 dark:text-slate-600">/</span>
    <span class="text-sm text-slate-500 dark:text-slate-400 truncate max-w-32">{{ current_org.name }}</span>
    {% endif %}
  </div>
  <div class="w-9"></div>
</header>
