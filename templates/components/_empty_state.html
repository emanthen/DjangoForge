<div class="flex flex-col items-center justify-center py-14 text-center">
  <div class="w-12 h-12 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center mb-3">
    <svg class="w-6 h-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
  </div>
  <h3 class="text-sm font-semibold text-slate-900 dark:text-slate-100 mb-1">{{ title|default:"Nothing here yet" }}</h3>
  <p class="text-sm text-slate-500 dark:text-slate-400 max-w-xs">{{ message|default:"Get started by creating your first item." }}</p>
  {% if action_url and action_label %}
  <div class="mt-5">
    <a href="{{ action_url }}" class="btn-primary">{{ action_label }}</a>
  </div>
  {% endif %}
</div>
