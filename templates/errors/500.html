{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
{% with hide_sidebar=True %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 px-4">
  <div class="text-center max-w-sm">
    <div class="text-[120px] font-black text-red-50 dark:text-red-950 leading-none select-none" aria-hidden="true">500</div>
    <div class="w-14 h-14 bg-red-100 dark:bg-red-950 rounded-2xl flex items-center justify-center mx-auto mb-5 -mt-2">
      <svg class="w-7 h-7 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">Something went wrong</h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm mb-8">Our team has been notified. Please try again in a moment.</p>
    <a href="/" class="btn-primary">Return home</a>
  </div>
</div>
{% endwith %}
{% endblock %}
