{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
{% with hide_sidebar=True %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 px-4">
  <div class="text-center max-w-sm">
    <div class="text-[120px] font-black text-slate-100 dark:text-slate-800 leading-none select-none" aria-hidden="true">404</div>
    <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2 -mt-2">Page not found</h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <div class="flex items-center justify-center gap-3">
      <a href="javascript:history.back()" class="btn-secondary">← Go back</a>
      <a href="{% url 'accounts:dashboard' %}" class="btn-primary">Dashboard</a>
    </div>
  </div>
</div>
{% endwith %}
{% endblock %}
